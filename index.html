<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company | Advanced Computing & Predictive Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.97); }
            to { opacity: 1; transform: scale(1); }
        }

        .animate-fade-in-up {
            opacity: 0;
            animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .animate-fade-in {
            opacity: 0;
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .animate-scale-in {
            opacity: 0;
            animation: scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .delay-0 { animation-delay: 0ms; }
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }

        .text-balance { text-wrap: balance; }

        @media (prefers-reduced-motion: reduce) {
            .animate-fade-in-up, .animate-fade-in, .animate-scale-in {
                animation: none;
                opacity: 1;
                transform: none;
            }
        }
    </style>
</head>
<body class="bg-black text-white overflow-x-hidden selection:bg-white selection:text-black">

    <div class="relative min-h-screen w-full flex flex-col">
        
        <!-- Background Image with Overlays -->
        <div class="absolute inset-0 z-0 overflow-hidden bg-black">
            <img 
                src="https://imolwncbqxugevwmleed.supabase.co/storage/v1/object/public/public-assets/hero-images/9e5d82b8-ed9c-4473-a740-e7de843bb0dd/hero-3-img-0-1778727910512.png" 
                alt="High-performance computing infrastructure and data visualization" 
                class="w-full h-full object-cover object-center opacity-50 animate-scale-in delay-0"
            />
            <!-- Gradient overlay to ensure text readability and match the moody tone -->
            <div class="absolute inset-0 bg-gradient-to-b from-black/20 via-black/50 to-black animate-fade-in delay-100"></div>
        </div>

        <!-- Header / Navigation -->
        <header class="relative z-10 w-full px-6 md:px-12 lg:px-16 py-8 flex justify-between items-center animate-fade-in delay-100">
            <!-- Logo -->
            <a href="#" class="flex items-center hover:opacity-90 transition-all duration-200 active:scale-[0.97]" aria-label="Company Home">
                <span class="text-2xl font-bold tracking-tighter uppercase">Company</span>
            </a>

            <!-- Navigation Links -->
            <nav class="flex items-center gap-8 md:gap-12 text-sm md:text-base font-medium">
                <a href="#" class="opacity-70 hover:opacity-100 transition-opacity duration-200">System Architecture</a>
                <a href="#" class="px-5 py-2 border border-white/20 hover:bg-white hover:text-black transition-all duration-200 active:scale-[0.97]">Deploy Platform</a>
            </nav>
        </header>

        <!-- Main Hero Content -->
        <main class="relative z-10 flex-grow flex flex-col justify-end pb-12 md:pb-16 lg:pb-24 px-6 md:px-12 lg:px-16">
            <div class="w-full max-w-[1400px] mx-auto">
                <h1 class="text-[4.5rem] sm:text-[6rem] md:text-[8rem] lg:text-[140px] xl:text-[160px] leading-tight font-medium tracking-tight text-white animate-fade-in-up delay-200 text-balance">
                    Scalable<br />
                    Intelligence.
                </h1>
                <div class="mt-8 md:mt-12 max-w-2xl animate-fade-in-up delay-300">
                    <p class="text-xl md:text-2xl text-white/70 leading-relaxed text-pretty font-light">
                        Company delivers a high-performance platform for elite engineering teams, leveraging proprietary predictive algorithms to secure total infrastructure control.
                    </p>
                    <div class="mt-10 flex flex-wrap gap-4">
                        <a href="#" class="px-8 py-4 bg-white text-black font-semibold hover:bg-white/90 transition-all duration-200 active:scale-[0.97] rounded-sm">
                            Access Infrastructure
                        </a>
                        <a href="#" class="px-8 py-4 border border-white/20 text-white font-semibold hover:bg-white/10 transition-all duration-200 active:scale-[0.97] rounded-sm">
                            Technical Specs
                        </a>
                    </div>
                </div>
            </div>
        </main>

    </div>

</body>
</html>
